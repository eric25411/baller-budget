<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BudgetFlow</title>
    
    <link rel="manifest" href="site.webmanifest">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        :root { --primary: #7BAFD4; --secondary: #2ecc71; --danger: #e74c3c; --bg: #f4f6f9; --card-bg: #ffffff; --text: #333; --border: #eee; }
        body.dark { --bg: #12171e; --card-bg: #1e252e; --text: #e0e0e0; --border: #2d3743; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); transition: background 0.3s; }
        
        #header { background: var(--primary); color: white; padding: 20px 15px 10px; text-align: center; }
        #header h1 { margin: 0; font-size: 1.5rem; font-weight: 800; }
        #greeting { font-size: 0.9rem; margin-top: 5px; opacity: 0.9; }
        
        #tabs-container { overflow-x: auto; white-space: nowrap; padding: 12px; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; gap: 8px; }
        #tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-btn { padding: 8px 16px; border-radius: 20px; border: none; background: var(--border); color: var(--text); cursor: pointer; font-weight: 600; font-size: 0.85rem; flex-shrink: 0; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card-bg); margin-bottom: 5px; border-bottom: 1px solid var(--border); }
        .panel { background: var(--card-bg); border-radius: 16px; padding: 15px; margin: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        
        /* DARK MODE INPUT FIX */
        .field { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
            background-color: var(--bg) !important; color: var(--text) !important; 
            -webkit-appearance: none; appearance: none;
            box-sizing: border-box; margin-bottom: 8px; font-size: 1rem; 
        }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 5px; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .mini-btn { padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.8rem; cursor: pointer; background: var(--border); color: var(--text); font-weight: 600; }
        
        .progress-bg { background: var(--border); height: 12px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--secondary); height: 100%; transition: width 0.3s; }
        
        .chart-container { position: relative; height: 180px; width: 100%; margin-bottom: 15px; }
        .paid { color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const STORAGE_KEY = 'budgetflow-v12-6';
    const TABS = [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'bills', label: 'Bills' },
        { id: 'schedule', label: 'Schedule' },
        { id: 'spending', label: 'Spending' },
        { id: 'deposits', label: 'Deposits' },
        { id: 'goals', label: 'Goals' },
        { id: 'settings', label: 'Settings' }
    ];

    const defaultData = { userName: 'Baller', darkMode: false, settings: { initialBalance: 0, rollover: 0, anchorDate: '2026-03-29', periodDays: 14 }, bills: [], spending: [], deposits: [], scheduleMeta: {}, goals: [] };
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || JSON.parse(localStorage.getItem('budgetflow-v12-5')) || defaultData;

    let activeTab = 'dashboard';
    let periodOffset = 0;
    let myChart = null;

    const save = () => { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); 
        render(); 
    };

    const format = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v || 0);

    function getPeriod() {
        const anchor = new Date((state.settings.anchorDate || '2026-03-29') + 'T00:00:00');
        const start = new Date(anchor);
        start.setDate(anchor.getDate() + (periodOffset * (state.settings.periodDays || 14)));
        const end = new Date(start);
        end.setDate(start.getDate() + ((state.settings.periodDays || 14) - 1));
        return { 
            startStr: start.toISOString().split('T')[0], 
            endStr: end.toISOString().split('T')[0], 
            label: `${start.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${end.toLocaleDateString('en-US', {month:'short', day:'numeric'})}` 
        };
    }

    function getSchedule() {
        const rows = [];
        const limit = new Date(); limit.setFullYear(limit.getFullYear() + 1);
        state.bills.forEach(b => {
            let curr = new Date(b.date + 'T00:00:00');
            let safety = 0;
            while (curr <= limit && safety < 100) {
                safety++;
                const dStr = curr.toISOString().split('T')[0];
                const key = `${b.id}_${dStr}`;
                const meta = state.scheduleMeta[key] || {};
                rows.push({ id: b.id, rowKey: key, date: dStr, name: b.name, amount: b.amount, actual: meta.actual, paid: meta.paid });
                if (b.freq === 'Weekly') curr.setDate(curr.getDate() + 7);
                else if (b.freq === 'Bi-Weekly') curr.setDate(curr.getDate() + 14);
                else if (b.freq === 'Monthly') curr.setMonth(curr.getMonth() + 1);
                else if (b.freq === 'Custom' && parseInt(b.customDays) > 0) curr.setDate(curr.getDate() + parseInt(b.customDays));
                else break;
            }
        });
        return rows.sort((a, b) => a.date.localeCompare(b.date));
    }

    function initChart(bills, spend, income) {
        const ctx = document.getElementById('budgetChart')?.getContext('2d');
        if (!ctx) return;
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Bills', 'Spending', 'Income'],
                datasets: [{
                    data: [bills, spend, income],
                    backgroundColor: ['#e74c3c', '#ff9f43', '#2ecc71'],
                    borderWidth: 0
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { color: state.darkMode ? '#e0e0e0' : '#333' } } }
            }
        });
    }

    function render() {
        if (state.darkMode) document.body.classList.add('dark'); else document.body.classList.remove('dark');
        
        document.body.innerHTML = `
            <div id="header"><h1>BudgetFlow</h1><div id="greeting">Welcome, ${state.userName}</div></div>
            <div id="tabs-container">
                ${TABS.map(t => `<button class="tab-btn ${activeTab === t.id ? 'active' : ''}" onclick="activeTab='${t.id}';render()">${t.label}</button>`).join('')}
            </div>
            <div id="main-content"></div>
        `;

        const content = document.getElementById('main-content');
        const p = getPeriod();
        const periodNav = `<div class="nav-bar"><button class="mini-btn" onclick="periodOffset--;render()">❮ Prev</button><strong style="color:var(--primary)">${p.label}</strong><button class="mini-btn" onclick="periodOffset++;render()">Next ❯</button></div>`;

        if (activeTab === 'dashboard') {
            const totalBillsToDate = getSchedule().filter(r => r.date <= p.endStr).reduce((s, r) => s + (r.actual ?? r.amount), 0);
            const totalSpentToDate = state.spending.filter(s => s.date <= p.endStr).reduce((s, x) => s + x.amount, 0);
            const totalDepositsToDate = state.deposits.filter(d => d.date <= p.endStr).reduce((s, x) => s + x.amount, 0);
            const runningBalance = (state.settings.initialBalance || 0) + (state.settings.rollover || 0) + totalDepositsToDate - totalBillsToDate - totalSpentToDate;
            
            const pBills = getSchedule().filter(r => r.date >= p.startStr && r.date <= p.endStr).reduce((s, r) => s + (r.actual ?? r.amount), 0);
            const pSpent = state.spending.filter(s => s.date >= p.startStr && s.date <= p.endStr).reduce((s, x) => s + x.amount, 0);
            const pIncome = state.deposits.filter(d => d.date >= p.startStr && d.date <= p.endStr).reduce((s, x) => s + x.amount, 0);

            content.innerHTML = periodNav + `
                <div class="panel" style="text-align:center">
                    <div class="chart-container"><canvas id="budgetChart"></canvas></div>
                    <small style="font-weight:bold; opacity:0.7">PROJECTED REMAINING</small>
                    <div style="font-size:2.2rem; font-weight:800; color:var(--primary)">${format(runningBalance)}</div>
                </div>
                <div class="stat-grid" style="margin: 0 12px;">
                    <div class="panel" style="margin:0; padding:10px;"><small>Bills</small><div style="font-weight:700; color:var(--danger)">${format(pBills)}</div></div>
                    <div class="panel" style="margin:0; padding:10px;"><small>Spend</small><div style="font-weight:700; color:var(--danger)">${format(pSpent)}</div></div>
                    <div class="panel" style="margin:0; padding:10px;"><small>Income</small><div style="font-weight:700; color:var(--secondary)">${format(pIncome)}</div></div>
                </div>`;
            setTimeout(() => initChart(pBills, pSpent, pIncome), 50);
        } else if (activeTab === 'settings') {
            content.innerHTML = `
                <div class="panel"><h3>User</h3><input class="field" value="${state.userName}" onchange="state.userName=this.value;save()"></div>
                <div class="panel"><h3>Preferences</h3><button class="btn btn-outline" onclick="state.darkMode=!state.darkMode;save()">${state.darkMode ? '☀️ Light' : '🌙 Dark'}</button></div>
                <div class="panel"><h3>Pay Cycle</h3>
                    <label><small>Starting Balance</small></label><input type="number" class="field" value="${state.settings.initialBalance}" onchange="state.settings.initialBalance=parseFloat(this.value);save()">
                    <label><small>Rollover Amount</small></label><input type="number" class="field" value="${state.settings.rollover || 0}" onchange="state.settings.rollover=parseFloat(this.value);save()">
                    <label><small>Anchor Date</small></label><input type="date" class="field" value="${state.settings.anchorDate}" onchange="state.settings.anchorDate=this.value;save()">
                </div>
                <div class="panel">
                    <h3>Data Management</h3>
                    <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
                    <button class="btn btn-outline" style="margin:10px 0" onclick="exportJSON()">Backup JSON</button>
                    <button class="btn btn-outline" onclick="importJSON()">Import JSON</button>
                    <button class="btn btn-danger" style="margin-top:20px" onclick="if(confirm('WIPE DATA?')) {state=defaultData;save();}">Reset All</button>
                </div>`;
        } else if (activeTab === 'schedule') {
            const list = getSchedule().filter(r => r.date >= p.startStr && r.date <= p.endStr);
            content.innerHTML = periodNav + list.map(x => `
                <div class="panel flex-between" style="${x.paid ? 'opacity:0.6' : ''}">
                    <div><strong>${x.name}</strong><br><small>${x.date}</small></div>
                    <div style="text-align:right">
                        <div onclick="updateActual('${x.rowKey}', ${x.amount})" style="font-weight:bold; cursor:pointer">${x.actual ? `<span class="paid">${format(x.actual)}</span>` : format(x.amount)}</div>
                        <button class="mini-btn" onclick="togglePaid('${x.rowKey}')">${x.paid ? '✓ Paid' : 'Mark Paid'}</button>
                    </div>
                </div>`).join('');
        }
        // ... Logic for Bills, Spending, Deposits, and Goals tabs continues here ...
    }

    // Window-level logic for PWA and Data
    window.togglePaid = (key) => { state.scheduleMeta[key] = state.scheduleMeta[key] || { paid: false }; state.scheduleMeta[key].paid = !state.scheduleMeta[key].paid; save(); };
    window.updateActual = (key, current) => { const val = prompt("Actual paid:", current); if (val) { state.scheduleMeta[key] = state.scheduleMeta[key] || {}; state.scheduleMeta[key].actual = parseFloat(val); state.scheduleMeta[key].paid = true; save(); } };
    window.exportCSV = () => { /* Logic for CSV Export */ };
    window.exportJSON = () => { const blob = new Blob([JSON.stringify(state)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'budget_backup.json'; a.click(); };
    window.importJSON = () => { const json = prompt("Paste JSON:"); if (json) { try { state = JSON.parse(json); save(); } catch(e) { alert("Invalid data"); } } };

    render();

    // REGISTER SERVICE WORKER FOR PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("PWA Active"))
            .catch(err => console.log("PWA Error", err));
    }
</script>
</body>
</html>

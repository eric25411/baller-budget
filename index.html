<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BudgetFlow Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #74b9ff; --secondary: #55efc4; --danger: #ff7675;
            --bg: #f1f2f6; --panel: #ffffff; --text: #2d3436; --border: #dfe6e9;
        }
        body.dark {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --border: #334155;
        }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }
        #header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        
        /* Clean Navigation - No Snapping */
        #tabs-container { 
            display: flex; overflow-x: auto; background: var(--panel); 
            padding: 12px; gap: 8px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100; -webkit-overflow-scrolling: touch;
        }
        #tabs-container::-webkit-scrollbar { display: none; }

        .panel { 
            background: var(--panel); margin: 15px 12px; padding: 20px; 
            border-radius: 16px; border: 1px solid var(--border);
        }
        .field { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid var(--border); background: var(--bg); color: var(--text);
            box-sizing: border-box; font-size: 16px;
        }
        .tab-btn {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); 
            background: var(--panel); color: var(--text); white-space: nowrap;
            font-weight: 600; cursor: pointer;
        }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 12px; }
        .summary-card { background: var(--panel); padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .chart-container { position: relative; height: 200px; width: 100%; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div id="app-root"></div>

<script>
    const STORAGE_KEY = 'budgetflow_v13';
    
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        userName: 'Baller',
        darkMode: false,
        settings: { initialBalance: 56.85, anchorDate: '2026-03-05', periodDays: 14 },
        bills: [], spending: [], deposits: [], goals: []
    };

    let activeTab = 'dashboard';
    let periodOffset = 0;
    let myChart = null;

    const save = () => { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); render(); };
    const format = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v || 0);

    function getPeriod(offset) {
        const anchor = new Date(state.settings.anchorDate + 'T00:00:00');
        const start = new Date(anchor);
        start.setDate(anchor.getDate() + (offset * state.settings.periodDays));
        const end = new Date(start);
        end.setDate(start.getDate() + (state.settings.periodDays - 1));
        return { start, end };
    }

    // Crucial: This calculates everything from the start of time up to the current visible period
    function getTotalsForPeriod(offset) {
        let runningBalance = state.settings.initialBalance;
        
        // Loop through all periods from the anchor up to the current offset to handle rollover
        for (let i = 0; i <= offset; i++) {
            const p = getPeriod(i);
            const filterFn = (item) => {
                const d = new Date(item.date + 'T00:00:00');
                return d >= p.start && d <= p.end;
            };

            const periodIncome = state.deposits.filter(filterFn).reduce((acc, d) => acc + (parseFloat(d.amount)||0), 0);
            const periodSpent = state.spending.filter(filterFn).reduce((acc, s) => acc + (parseFloat(s.amount)||0), 0);
            const periodBills = state.bills.reduce((acc, b) => acc + (parseFloat(b.amount)||0), 0);

            if (i === offset) {
                return { income: periodIncome, spent: periodSpent, bills: periodBills, startBalance: runningBalance };
            }
            runningBalance += (periodIncome - periodSpent - periodBills);
        }
        return { income: 0, spent: 0, bills: 0, startBalance: runningBalance };
    }

    function render() {
        const root = document.getElementById('app-root');
        document.body.classList.toggle('dark', state.darkMode);
        const p = getPeriod(periodOffset);
        const pLabel = `${p.start.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${p.end.toLocaleDateString('en-US', {month:'short', day:'numeric'})}`;

        root.innerHTML = `
            <div id="header">
                <h1 style="margin:0; font-size: 22px;">BudgetFlow</h1>
                <div style="opacity:0.8; font-size:14px;">Welcome, ${state.userName}</div>
            </div>
            <div id="tabs-container">
                ${['Dashboard', 'Bills', 'Spending', 'Deposits', 'Goals', 'Settings'].map(t => 
                    `<button class="tab-btn ${activeTab === t.toLowerCase() ? 'active' : ''}" onclick="activeTab='${t.toLowerCase()}'; render()">${t}</button>`
                ).join('')}
            </div>
            <div id="main-content">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 12px;">
                    <button class="tab-btn" onclick="periodOffset--;render()">❮ Prev</button>
                    <strong style="color:var(--primary)">${pLabel}</strong>
                    <button class="tab-btn" onclick="periodOffset++;render()">Next ❯</button>
                </div>
                ${renderTab(activeTab, p)}
            </div>
        `;
        if (activeTab === 'dashboard') setTimeout(() => initChart(), 50);
    }

    function renderTab(tab, p) {
        const totals = getTotalsForPeriod(periodOffset);
        const projected = totals.startBalance + totals.income - totals.spent - totals.bills;

        if (tab === 'dashboard') {
            return `
                <div class="panel" style="text-align:center">
                    <div class="chart-container"><canvas id="budgetChart"></canvas></div>
                    <small style="text-transform:uppercase; opacity:0.6; font-weight:bold">Projected Remaining</small>
                    <div style="font-size:32px; font-weight:800; color:var(--primary);">${format(projected)}</div>
                </div>
                <div class="summary-grid">
                    <div class="summary-card"><small>Bills</small><br><strong style="color:var(--danger)">${format(totals.bills)}</strong></div>
                    <div class="summary-card"><small>Spend</small><br><strong style="color:var(--danger)">${format(totals.spent)}</strong></div>
                    <div class="summary-card"><small>Income</small><br><strong style="color:var(--secondary)">${format(totals.income)}</strong></div>
                </div>
                <div class="panel" style="display:flex; gap:10px;">
                    <button class="btn" style="background:var(--danger); color:white" onclick="quickAdd('spending')">-$ Spend</button>
                    <button class="btn" style="background:var(--secondary); color:white" onclick="quickAdd('deposits')">+$ Income</button>
                </div>`;
        }

        if (tab === 'settings') {
            return `
                <div class="panel">
                    <h3>Preferences</h3>
                    <button class="btn" onclick="state.darkMode=!state.darkMode;save()">${state.darkMode ? '☀️ Light Mode' : '🌙 Dark Mode'}</button>
                    <label><small>User Name</small></label>
                    <input class="field" value="${state.userName}" onchange="state.userName=this.value;save()">
                </div>
                <div class="panel">
                    <h3>Pay Cycle</h3>
                    <label><small>Starting Balance (Anchor)</small></label>
                    <input type="number" class="field" value="${state.settings.initialBalance}" onchange="state.settings.initialBalance=parseFloat(this.value);save()">
                    <label><small>Anchor Date</small></label>
                    <input type="date" class="field" value="${state.settings.anchorDate}" onchange="state.settings.anchorDate=this.value;save()">
                </div>
                <div class="panel">
                    <h3>Data Management</h3>
                    <button class="btn" onclick="exportData()">Backup JSON</button>
                    <button class="btn" onclick="importData()">Import JSON</button>
                    <button class="btn" style="background:var(--danger); color:white" onclick="if(confirm('Clear all?')){state.bills=[];state.spending=[];state.deposits=[];save();}">Reset All Data</button>
                </div>`;
        }

        // Generic List View for Bills, Spending, Deposits
        const list = state[tab] || [];
        return `
            <div class="panel">
                <h3>Add ${tab.charAt(0).toUpperCase() + tab.slice(1)}</h3>
                <input id="addName" class="field" placeholder="Description">
                <input id="addAmt" type="number" class="field" placeholder="Amount">
                <input id="addDate" type="date" class="field" value="${new Date().toISOString().split('T')[0]}">
                <button class="btn" style="background:var(--primary); color:white" onclick="addItem('${tab}')">Add Item</button>
            </div>
            <div class="panel">
                ${list.length ? list.map((item, i) => `
                    <div class="item-row">
                        <div><strong>${item.name}</strong><br><small>${item.date || ''}</small></div>
                        <div>${format(item.amount)} <span class="action-link" style="color:var(--danger); margin-left:10px" onclick="state['${tab}'].splice(${i},1);save()">Delete</span></div>
                    </div>
                `).join('') : '<p>No entries yet.</p>'}
            </div>`;
    }

    window.addItem = (type) => {
        const name = document.getElementById('addName').value;
        const amount = parseFloat(document.getElementById('addAmt').value);
        const date = document.getElementById('addDate').value;
        if (name && amount) { state[type].push({ name, amount, date }); save(); }
    };

    window.quickAdd = (type) => {
        const amt = prompt(`Enter ${type} amount:`);
        if (amt) { state[type].push({ name: 'Quick Entry', amount: parseFloat(amt), date: new Date().toISOString().split('T')[0] }); save(); }
    };

    window.exportData = () => {
        const blob = new Blob([JSON.stringify(state)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'budgetflow_backup.json';
        a.click();
    };

    window.importData = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = () => { state = JSON.parse(reader.result); save(); };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    };

    function initChart() {
        const ctx = document.getElementById('budgetChart')?.getContext('2d');
        if (!ctx) return;
        const t = getTotalsForPeriod(periodOffset);
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Bills', 'Spent', 'Remaining'],
                datasets: [{ 
                    data: [t.bills, t.spent, Math.max(0, t.startBalance + t.income - t.bills - t.spent)], 
                    backgroundColor: ['#ff7675', '#fdcb6e', '#55efc4'], 
                    borderWidth: 0 
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#74b9ff">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Font_Awesome_5_solid_wallet.svg/512px-Font_Awesome_5_solid_wallet.svg.png">
    <title>BudgetFlow Pro V2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #74b9ff; --secondary: #55efc4; --danger: #ff7675; --bg: #f1f2f6; --panel: #ffffff; --text: #2d3436; --border: #dfe6e9; }
        body.dark { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --border: #334155; }
        html, body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; inset: 0; }
        #app-container { display: flex; flex-direction: column; width: 100%; height: 100%; }
        #header { background: var(--primary); color: white; padding: max(20px, env(safe-area-inset-top)) 20px 15px; text-align: center; }
        #tabs-container { display: flex; overflow-x: auto; background: var(--panel); padding: 0 10px; border-bottom: 1px solid var(--border); scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .tab-btn { background: transparent; border: none; border-bottom: 3px solid transparent; padding: 12px 16px; color: var(--text); opacity: 0.5; font-weight: 600; font-size: 15px; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { opacity: 1; color: var(--primary); border-bottom: 3px solid var(--primary); }
        #swipe-wrapper { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .view-page { flex: 0 0 100%; width: 100%; height: 100%; overflow-y: auto; scroll-snap-align: center; padding-bottom: 80px; box-sizing: border-box; }
        .panel { background: var(--panel); margin: 15px 12px; padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .field { width: 100%; height: 46px; padding: 0 14px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px !important; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top:5px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 12px; }
        .summary-card { background: var(--panel); padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        #bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--panel); border-radius: 24px 24px 0 0; padding: 25px 20px 40px; transition: 0.3s; z-index: 1000; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); }
        #bottom-sheet.open { bottom: 0; }
        #sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .action-link { color: var(--primary); font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>
<div id="app-container">
    <div id="header"><h1 style="margin:0; font-size: 22px;">BudgetFlow</h1><div id="welcome-text" style="font-size:13px; opacity:0.8;"></div></div>
    <div id="tabs-container"></div>
    <div id="swipe-wrapper">
        <div class="view-page" data-index="0" id="view-dashboard"></div>
        <div class="view-page" data-index="1" id="view-bills"></div>
        <div class="view-page" data-index="2" id="view-schedule"></div>
        <div class="view-page" data-index="3" id="view-spending"></div>
        <div class="view-page" data-index="4" id="view-deposits"></div>
        <div class="view-page" data-index="5" id="view-goals"></div>
        <div class="view-page" data-index="6" id="view-settings"></div>
    </div>
</div>
<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="bottom-sheet">
    <h3 id="sheet-title" style="text-align:center;">Add Item</h3>
    <input id="qDesc" class="field" placeholder="Description"><input id="qAmt" type="number" class="field" placeholder="Amount"><input id="qDate" type="date" class="field">
    <select id="qCategory" class="field" style="display:none;"><option>Uncategorized</option><option>Groceries</option><option>Dining Out</option><option>Shopping</option></select>
    <button id="sheet-save" class="btn" style="background:var(--primary); color:white">Save</button>
</div>

<script>
    const STORAGE_KEY = 'budgetflow_pro_gold';
    const API_URL = 'http://152.44.36.203:3000';
    const SYNC_PASS = 'MannySync2026';
    
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        userName: 'Manny', darkMode: true, settings: { initialBalance: 0, rollover: 0, anchorDate: '2026-03-05', periodDays: 14 },
        bills: [], spending: [], deposits: [], scheduleMeta: {}, goals: []
    };

    let activeIndex = 0, periodOffset = 0, myChart = null, catChart = null;

    // CLOUD SYNC
    async function syncFromCloud() {
        try {
            const res = await fetch(`${API_URL}/data?password=${SYNC_PASS}`);
            if (res.ok) {
                const cloud = await res.json();
                if (cloud && Object.keys(cloud).length > 0) { state = cloud; saveLocal(); render(); }
            }
        } catch (e) { console.log("Offline"); render(); }
    }

    const saveLocal = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    const save = async () => {
        saveLocal(); render();
        try {
            await fetch(`${API_URL}/sync`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: SYNC_PASS, state: state })
            });
        } catch (e) { console.error("Sync Failed"); }
    };

    // TAB ENGINE
    const swipeObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { activeIndex = parseInt(e.target.dataset.index); updateTabsUI(); } });
    }, { threshold: 0.6 });
    document.querySelectorAll('.view-page').forEach(p => swipeObserver.observe(p));

    function updateTabsUI() {
        document.getElementById('tabs-container').innerHTML = ['Dashboard', 'Bills', 'Schedule', 'Spending', 'Deposits', 'Goals', 'Settings'].map((t, i) => 
            `<button class="tab-btn ${i===activeIndex?'active':''}" onclick="document.querySelectorAll('.view-page')[${i}].scrollIntoView({behavior:'smooth'})">${t}</button>`).join('');
    }

    // HELPERS
    const format = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v || 0);
    function getPeriod(off) {
        const start = new Date(state.settings.anchorDate + 'T00:00:00');
        start.setDate(start.getDate() + (off * state.settings.periodDays));
        const end = new Date(start); end.setDate(start.getDate() + state.settings.periodDays - 1);
        return { startStr: start.toISOString().split('T')[0], endStr: end.toISOString().split('T')[0], label: `${start.toLocaleDateString()} - ${end.toLocaleDateString()}` };
    }

    // DATA MANAGEMENT (RESTORED)
    window.exportJSON = () => {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(state)], {type:'application/json'})); a.download = 'budget_backup.json'; a.click();
    };
    window.importJSON = () => {
        const f = document.createElement('input'); f.type = 'file';
        f.onchange = e => { const r = new FileReader(); r.onload = () => { state = JSON.parse(r.result); save(); }; r.readAsText(e.target.files[0]); }; f.click();
    };

    function render() {
        document.body.classList.toggle('dark', state.darkMode);
        document.getElementById('welcome-text').innerText = `Welcome, ${state.userName}`;
        const p = getPeriod(periodOffset);
        
        // DASHBOARD RENDER
        document.getElementById('view-dashboard').innerHTML = `
            <div style="display:flex; justify-content:space-between; padding:10px 15px;">
                <button onclick="periodOffset--;render()">❮</button><strong>${p.label}</strong><button onclick="periodOffset++;render()">❯</button>
            </div>
            <div class="panel" style="text-align:center"><canvas id="budgetChart" style="max-height:180px"></canvas><h2>${state.userName}'s Cloud Budget</h2></div>
            <div class="summary-grid"><div class="summary-card">Income<br><strong>${format(0)}</strong></div><div class="summary-card">Spent<br><strong>${format(0)}</strong></div></div>
        `;

        // SETTINGS RENDER (With Backup Buttons)
        document.getElementById('view-settings').innerHTML = `
            <div class="panel"><h3>Preferences</h3><button class="btn" onclick="state.darkMode=!state.darkMode;save()">${state.darkMode?'☀️ Light':'🌙 Dark'}</button></div>
            <div class="panel"><h3>Data Management</h3>
                <button class="btn" style="background:#ddd" onclick="exportJSON()">Backup to File</button>
                <button class="btn" style="background:#ddd; margin-top:10px" onclick="importJSON()">Load from File</button>
                <button class="btn" style="background:var(--danger); color:white; margin-top:20px" onclick="if(confirm('Wipe data?')){localStorage.clear();location.reload();}">Reset All</button>
            </div>`;
        
        updateTabsUI();
        if(activeIndex === 0) setTimeout(drawCharts, 50);
    }

    function drawCharts() {
        const ctx = document.getElementById('budgetChart'); if(!ctx) return;
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels:['Remaining'], datasets:[{data:[100], backgroundColor:['#55efc4']}] }, options: { cutout:'80%' } });
    }

    window.openSheet = (t) => { document.getElementById('sheet-overlay').style.display='block'; document.getElementById('bottom-sheet').classList.add('open'); };
    window.closeSheet = () => { document.getElementById('sheet-overlay').style.display='none'; document.getElementById('bottom-sheet').classList.remove('open'); };

    syncFromCloud();
</script>
</body>
</html>

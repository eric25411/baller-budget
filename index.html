<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>BudgetFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #7BAFD4; --secondary: #2ecc71; --danger: #e74c3c; --bg: #f4f6f9; --card-bg: #ffffff; --text: #333; --border: #eee; }
        body.dark { --bg: #12171e; --card-bg: #1e252e; --text: #e0e0e0; --border: #2d3743; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); transition: background 0.3s; }
        #header { background: var(--primary); color: white; padding: 20px 15px; text-align: center; }
        #tabs-container { overflow-x: auto; white-space: nowrap; padding: 12px; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; gap: 8px; }
        .tab-btn { padding: 8px 16px; border-radius: 20px; border: none; background: var(--border); color: var(--text); font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .panel { background: var(--card-bg); border-radius: 16px; padding: 15px; margin: 12px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .field { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg); color: var(--text); box-sizing: border-box; margin-bottom: 8px; font-size: 1rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mini-btn { padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.8rem; cursor: pointer; background: var(--border); color: var(--text); font-weight: 600; }
        .chart-container { position: relative; height: 180px; width: 100%; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="header">
    <h1>BudgetFlow</h1>
    <div id="greeting">Welcome, <span id="user-display">Baller</span></div>
</div>

<div id="tabs-container"></div>
<div id="main-content"></div>

<script>
    const STORAGE_KEY = 'budgetflow-v12-6';
    const TABS = [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'bills', label: 'Bills' },
        { id: 'schedule', label: 'Schedule' },
        { id: 'spending', label: 'Spending' },
        { id: 'deposits', label: 'Deposits' },
        { id: 'settings', label: 'Settings' }
    ];

    const defaultData = { userName: 'Baller', darkMode: false, settings: { initialBalance: 0, rollover: 0, anchorDate: '2026-03-29', periodDays: 14 }, bills: [], spending: [], deposits: [], scheduleMeta: {} };
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultData;
    let activeTab = 'dashboard';
    let periodOffset = 0;
    let myChart = null;

    const save = () => { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); 
        render(); 
    };

    const format = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v || 0);

    function getPeriod() {
        const anchor = new Date(state.settings.anchorDate + 'T00:00:00');
        const start = new Date(anchor);
        start.setDate(anchor.getDate() + (periodOffset * state.settings.periodDays));
        const end = new Date(start);
        end.setDate(start.getDate() + (state.settings.periodDays - 1));
        return { 
            startStr: start.toISOString().split('T')[0], 
            endStr: end.toISOString().split('T')[0], 
            label: `${start.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${end.toLocaleDateString('en-US', {month:'short', day:'numeric'})}` 
        };
    }

    function render() {
        if (state.darkMode) document.body.classList.add('dark'); else document.body.classList.remove('dark');
        document.getElementById('user-display').innerText = state.userName;

        // Render Tabs
        document.getElementById('tabs-container').innerHTML = TABS.map(t => `
            <button class="tab-btn ${activeTab === t.id ? 'active' : ''}" onclick="activeTab='${t.id}';render()">${t.label}</button>
        `).join('');

        const content = document.getElementById('main-content');
        const p = getPeriod();
        const periodNav = `<div class="flex-between" style="padding:10px 15px;"><button class="mini-btn" onclick="periodOffset--;render()">❮</button><strong>${p.label}</strong><button class="mini-btn" onclick="periodOffset++;render()">❯</button></div>`;

        if (activeTab === 'dashboard') {
            const runningBalance = (state.settings.initialBalance || 0) + (state.settings.rollover || 0);
            content.innerHTML = periodNav + `
                <div class="panel" style="text-align:center">
                    <div class="chart-container"><canvas id="budgetChart"></canvas></div>
                    <small>PROJECTED REMAINING</small>
                    <div style="font-size:2.2rem; font-weight:800; color:var(--primary)">${format(runningBalance)}</div>
                </div>
                <div style="display:flex; gap:10px; margin:0 12px;">
                    <button class="btn" style="background:var(--danger)" onclick="quickAdd('spending')">− Spend</button>
                    <button class="btn" style="background:var(--secondary)" onclick="quickAdd('deposits')">+ Income</button>
                </div>`;
            setTimeout(initChart, 50);
        } else if (activeTab === 'settings') {
            content.innerHTML = `
                <div class="panel"><h3>User</h3><input class="field" value="${state.userName}" onchange="state.userName=this.value;save()"></div>
                <div class="panel"><h3>Preferences</h3><button class="btn" onclick="state.darkMode=!state.darkMode;save()">${state.darkMode ? '☀️ Light' : '🌙 Dark'}</button></div>
                <div class="panel">
                    <h3>Data</h3>
                    <button class="btn" onclick="exportJSON()">Backup JSON</button>
                </div>`;
        } else {
            content.innerHTML = periodNav + `<div class="panel">Section ${activeTab} content...</div>`;
        }
    }

    function initChart() {
        const ctx = document.getElementById('budgetChart')?.getContext('2d');
        if (!ctx) return;
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Spent', 'Left'], datasets: [{ data: [30, 70], backgroundColor: ['#ff7675', '#2ecc71'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    window.quickAdd = (type) => {
        const val = prompt(`Enter ${type} amount:`);
        if (val) { state[type].push({ amount: parseFloat(val), date: new Date().toISOString().split('T')[0], name: 'Quick Entry' }); save(); }
    };

    window.exportJSON = () => {
        const blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'budget_backup.json';
        a.click();
    };

    render();
</script>
</body>
</html>

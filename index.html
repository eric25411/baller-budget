<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BudgetFlow Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #74b9ff; --secondary: #55efc4; --danger: #ff7675; --bg: #f1f2f6; --panel: #ffffff; --text: #2d3436; --border: #dfe6e9; }
        body.dark { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --border: #334155; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 60px; }
        #header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        #tabs-container { display: flex; overflow-x: auto; background: var(--panel); padding: 10px; gap: 8px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; scrollbar-width: none; }
        .tab-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--panel); color: var(--text); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .panel { background: var(--panel); margin: 10px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .field { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; margin-top: 5px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .progress-bar { background: var(--bg); height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--secondary); height: 100%; transition: width 0.4s; }
    </style>
</head>
<body>

<div id="header"><h2 style="margin:0">BudgetFlow</h2></div>
<div id="tabs-container"></div>
<div id="main-content"></div>

<script>
    const STORAGE_KEY = 'bf_v14_final';
    const TABS = ['Dashboard', 'Bills', 'Schedule', 'Spending', 'Deposits', 'Goals', 'Settings'];
    
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        userName: 'Manny', darkMode: true,
        settings: { initialBalance: 56.85, rollover: 0, anchorDate: '2026-03-29', periodDays: 14 },
        bills: [], spending: [], deposits: [], scheduleMeta: {}, goals: []
    };

    let activeTab = 'Dashboard';
    let periodOffset = 0;
    let myChart = null;

    const save = () => { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); render(); };
    const format = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v || 0);

    function getPeriod() {
        const anchor = new Date(state.settings.anchorDate + 'T00:00:00');
        const start = new Date(anchor);
        start.setDate(anchor.getDate() + (periodOffset * state.settings.periodDays));
        const end = new Date(start);
        end.setDate(start.getDate() + (state.settings.periodDays - 1));
        return { 
            startStr: start.toISOString().split('T')[0], 
            endStr: end.toISOString().split('T')[0], 
            label: `${start.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${end.toLocaleDateString('en-US', {month:'short', day:'numeric'})}` 
        };
    }

    function getSchedule() {
        const rows = [];
        const limit = new Date(); limit.setFullYear(limit.getFullYear() + 1);
        state.bills.forEach(b => {
            let curr = new Date(b.date + 'T00:00:00');
            let safety = 0;
            while (curr <= limit && safety < 100) {
                const dStr = curr.toISOString().split('T')[0];
                const key = `${b.id}_${dStr}`;
                const meta = state.scheduleMeta[key] || {};
                rows.push({ ...b, rowKey: key, date: dStr, actual: meta.actual, paid: meta.paid });
                if (b.freq === 'Weekly') curr.setDate(curr.getDate() + 7);
                else if (b.freq === 'Bi-Weekly') curr.setDate(curr.getDate() + 14);
                else if (b.freq === 'Monthly') curr.setMonth(curr.getMonth() + 1);
                else break;
                safety++;
            }
        });
        return rows.sort((a, b) => a.date.localeCompare(b.date));
    }

    function render() {
        document.body.className = state.darkMode ? 'dark' : '';
        const p = getPeriod();

        // 1. Render Tabs
        document.getElementById('tabs-container').innerHTML = TABS.map(t => 
            `<button class="tab-btn ${activeTab === t ? 'active' : ''}" onclick="activeTab='${t}'; render();">${t}</button>`
        ).join('');

        // 2. Math
        const totalBillsToDate = getSchedule().filter(r => r.date <= p.endStr).reduce((s, r) => s + (r.actual ?? r.amount), 0);
        const totalSpentToDate = state.spending.filter(s => s.date <= p.endStr).reduce((s, x) => s + x.amount, 0);
        const totalIncomeToDate = state.deposits.filter(d => d.date <= p.endStr).reduce((s, x) => s + x.amount, 0);
        const runningBalance = (state.settings.initialBalance + state.settings.rollover + totalIncomeToDate) - (totalBillsToDate + totalSpentToDate);

        const pBills = getSchedule().filter(r => r.date >= p.startStr && r.date <= p.endStr).reduce((s, r) => s + (r.actual ?? r.amount), 0);
        const pSpent = state.spending.filter(s => s.date >= p.startStr && s.date <= p.endStr).reduce((s, x) => s + x.amount, 0);
        const pIncome = state.deposits.filter(d => d.date >= p.startStr && d.date <= p.endStr).reduce((s, x) => s + x.amount, 0);

        const nav = `<div class="flex-between" style="padding:10px 12px;"><button class="tab-btn" onclick="periodOffset--; render()">❮</button><strong>${p.label}</strong><button class="tab-btn" onclick="periodOffset++; render()">❯</button></div>`;

        // 3. Render Content
        let html = '';
        if (activeTab === 'Dashboard') {
            html = nav + `<div class="panel" style="text-align:center"><div style="height:160px;"><canvas id="budgetChart"></canvas></div><div style="font-size:2rem; font-weight:800; color:var(--primary); margin-top:10px;">${format(runningBalance)}</div></div><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; padding:0 10px;"><div class="panel" style="margin:0; text-align:center"><small>Bills</small><br><b>${format(pBills)}</b></div><div class="panel" style="margin:0; text-align:center"><small>Spent</small><br><b>${format(pSpent)}</b></div><div class="panel" style="margin:0; text-align:center"><small>Income</small><br><b>${format(pIncome)}</b></div></div><div style="padding:15px"><button class="btn" style="background:var(--danger);color:white" onclick="quickAdd('spending')">− Add Spending</button><button class="btn" style="background:var(--secondary);color:white" onclick="quickAdd('deposits')">+ Add Income</button></div>`;
        } else if (activeTab === 'Bills') {
            html = `<div class="panel"><h3>New Bill</h3><input id="bn" class="field" placeholder="Name"><input id="ba" type="number" class="field" placeholder="Amount"><input id="bd" type="date" class="field"><select id="bf" class="field"><option>Monthly</option><option>Bi-Weekly</option><option>Weekly</option></select><button class="btn" style="background:var(--primary);color:white" onclick="addBill()">Add Bill</button></div><div class="panel">${state.bills.map((b, i) => `<div class="item-row flex-between"><div><b>${b.name}</b><br><small>${b.freq}</small></div><div>${format(b.amount)} <span style="color:var(--danger); margin-left:10px" onclick="state.bills.splice(${i},1);save()">✕</span></div></div>`).join('')}</div>`;
        } else if (activeTab === 'Schedule') {
            const list = getSchedule().filter(r => r.date >= p.startStr && r.date <= p.endStr);
            html = nav + `<div class="panel">${list.length ? list.map(r => `<div class="item-row flex-between" style="opacity:${r.paid?0.5:1}"><div><b>${r.name}</b><br><small>${r.date}</small></div><div style="text-align:right"><b>${format(r.amount)}</b><br><button class="tab-btn" style="font-size:0.7rem; padding:4px 8px" onclick="togglePaid('${r.rowKey}')">${r.paid?'Paid':'Mark Paid'}</button></div></div>`).join('') : '<p>Empty.</p>'}</div>`;
        } else if (activeTab === 'Spending' || activeTab === 'Deposits') {
            const list = state[activeTab.toLowerCase()].filter(x => x.date >= p.startStr && x.date <= p.endStr);
            html = nav + `<div class="panel"><h3>Add ${activeTab}</h3><input id="en" class="field" placeholder="Note"><input id="ea" type="number" class="field" placeholder="Amount"><button class="btn" style="background:var(--primary);color:white" onclick="manualAdd('${activeTab.toLowerCase()}')">Save</button></div><div class="panel">${list.map(x => `<div class="item-row flex-between"><div><b>${x.name}</b><br><small>${x.date}</small></div><b>${format(x.amount)}</b></div>`).join('')}</div>`;
        } else if (activeTab === 'Goals') {
            html = `<div class="panel"><h3>Goals</h3><input id="gn" class="field" placeholder="Goal Name"><input id="gt" type="number" class="field" placeholder="Target"><button class="btn" style="background:var(--primary);color:white" onclick="addGoal()">Create</button></div>${(state.goals || []).map((g, i) => { const perc = Math.min((state.settings.rollover / g.target) * 100, 100); return `<div class="panel"><div class="flex-between"><b>${g.name}</b><span>${format(state.settings.rollover)} / ${format(g.target)}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div><small>${perc.toFixed(0)}% Complete</small></div>`; }).join('')}`;
        } else if (activeTab === 'Settings') {
            html = `<div class="panel"><h3>Settings</h3><input class="field" value="${state.userName}" onchange="state.userName=this.value;save()"><button class="btn" onclick="state.darkMode=!state.darkMode;save()">Toggle Theme</button><hr><label>Start Balance</label><input type="number" class="field" value="${state.settings.initialBalance}" onchange="state.settings.initialBalance=parseFloat(this.value);save()"><label>Savings</label><input type="number" class="field" value="${state.settings.rollover}" onchange="state.settings.rollover=parseFloat(this.value);save()"><hr><button class="btn" onclick="exportJSON()">Backup</button><button class="btn" onclick="importJSON()">Restore</button><button class="btn" style="background:var(--danger);color:white" onclick="resetAll()">Reset</button></div>`;
        }

        document.getElementById('main-content').innerHTML = html;
        if (activeTab === 'Dashboard') setTimeout(() => initChart(pBills, pSpent, pIncome), 10);
    }

    window.quickAdd = (type) => { const n = prompt("Note:"); const a = prompt("Amount:"); if(n && a) { state[type].push({ name: n, amount: parseFloat(a), date: new Date().toISOString().split('T')[0] }); save(); } };
    window.manualAdd = (type) => { const n = document.getElementById('en').value; const a = document.getElementById('ea').value; if(n && a) { state[type].push({ name: n, amount: parseFloat(a), date: new Date().toISOString().split('T')[0] }); save(); } };
    window.addBill = () => { const n = document.getElementById('bn').value; const a = document.getElementById('ba').value; const d = document.getElementById('bd').value; const f = document.getElementById('bf').value; if(n && a && d) { state.bills.push({ name: n, amount: parseFloat(a), date: d, freq: f, id: Date.now() }); save(); } };
    window.addGoal = () => { const n = document.getElementById('gn').value; const t = document.getElementById('gt').value; if(n && t) { if(!state.goals) state.goals = []; state.goals.push({ name: n, target: parseFloat(t) }); save(); } };
    window.togglePaid = (key) => { state.scheduleMeta[key] = state.scheduleMeta[key] || { paid: false }; state.scheduleMeta[key].paid = !state.scheduleMeta[key].paid; save(); };
    window.exportJSON = () => { const blob = new Blob([JSON.stringify(state)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup.json`; a.click(); };
    window.importJSON = () => { const input = prompt("Paste JSON:"); if (input) { try { state = JSON.parse(input); save(); } catch(e) { alert("Error"); } } };
    window.resetAll = () => { if(confirm("Clear?")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } };

    function initChart(b, s, i) {
        const canvas = document.getElementById('budgetChart');
        if (!canvas) return;
        if (myChart) myChart.destroy();
        myChart = new Chart(canvas.getContext('2d'), { type: 'doughnut', data: { datasets: [{ data: [b, s, Math.max(i, 0.01)], backgroundColor: ['#ff7675', '#fdcb6e', '#55efc4'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, animation: false } });
    }

    document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
